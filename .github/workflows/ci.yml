name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Dependency Vulnerability Check
        run: npm audit
      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - name: Run Linter
        run: npm run lint
      - name: Run Formatter Check
        run: npm run format:check

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm test
      - name: Upload Coverage
        uses: codecov/codecov-action@v6
        with:
          directory: ./coverage
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Package
        run: npm pack
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: package
          path: '*.tgz'

  deploy_staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v6
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: package
      - name: Deploy to Staging
        run: echo "Deploying to Staging Environment..."
      - name: Health Check
        run: echo "Running Health Checks on Staging..."
      - name: Notify Slack
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: 'Staging deployment completed.'

  deploy_production:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://npmjs.com/package/gign
    steps:
      - uses: actions/checkout@v6
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: package
      - name: Deploy to Production
        run: echo "Deploying to Production... this would typically run 'npm publish'"
      - name: Post-Deployment Health Check
        run: echo "Running Health Checks on Production..."
      - name: Error Tracking Verification
        run: echo "Verifying Sentry/Error Tracking is active..."
      - name: Notify Slack on Success
        uses: rtCamp/action-slack-notify@v2
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: 'Production deployment successful :rocket:'
      - name: Notify Slack on Failure
        uses: rtCamp/action-slack-notify@v2
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: 'Production deployment failed :alert: Rollback capability required.'
          SLACK_COLOR: 'danger'
